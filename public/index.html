<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מאזן — ניהול פיננסי אישי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #1e4d35;
      --green-mid:    #2d6a4f;
      --green-soft:   #52b788;
      --green-mint:   #d8f3dc;
      --green-pale:   #f0faf2;
      --gold:         #b7924c;
      --gold-light:   #f5e6cc;
      --bg:           #fafaf8;
      --surface:      #ffffff;
      --surface2:     #f4f6f3;
      --border:       #e2ebe4;
      --text:         #111c14;
      --text-mid:     #2e4435;
      --text-dim:     #4a6352;
      --red:          #c0392b;
      --red-light:    #fdf0ee;
    }

    html { font-size: 17px; scrollbar-gutter: stable both-edges; }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface2); }
    ::-webkit-scrollbar-thumb { background: var(--green-mint); border-radius: 99px; }

    /* Selection */
    ::selection { background: var(--green-mint); color: var(--green-deep); }

    button, input, select, textarea {
      font-family: 'Rubik', sans-serif;
    }

    /* Fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes btnShimmer {
      0%   { background-position: 0% center; }
      100% { background-position: -200% center; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .fade-up { animation: fadeUp 0.4s ease forwards; }

    /* Login page utilities */
    .login-input:hover { border-color: #a8c0ac !important; }
    .login-btn:active:not([disabled]) {
      transform: scale(0.96) !important;
      transition: transform 0.1s !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
